# Apache VirtualHost Configuration for Chinese Cars Portal
# Location: /etc/apache2/sites-available/chinese-cars-portal.conf

<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com
    ServerAdmin admin@yourdomain.com

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/chinese-cars-portal-error.log
    CustomLog ${APACHE_LOG_DIR}/chinese-cars-portal-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com
    ServerAdmin admin@yourdomain.com

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/yourdomain.com/privkey.pem

    # Security Headers
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "DENY"
    Header set X-XSS-Protection "1; mode=block"
    Header set Referrer-Policy "strict-origin-when-cross-origin"

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/chinese-cars-portal-error.log
    CustomLog ${APACHE_LOG_DIR}/chinese-cars-portal-access.log combined

    # Enable necessary Apache modules
    # a2enmod proxy
    # a2enmod proxy_http
    # a2enmod rewrite
    # a2enmod headers
    # a2enmod ssl

    # Django backend (Gunicorn proxy)
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api
    ProxyPass /admin http://127.0.0.1:8000/admin
    ProxyPassReverse /admin http://127.0.0.1:8000/admin
    ProxyPass /static http://127.0.0.1:8000/static
    ProxyPassReverse /static http://127.0.0.1:8000/static
    ProxyPass /media http://127.0.0.1:8000/media
    ProxyPassReverse /media http://127.0.0.1:8000/media

    # React Frontend
    DocumentRoot /var/www/chinese-cars-portal/frontend/dist

    <Directory /var/www/chinese-cars-portal/frontend/dist>
        # React Router - Route all to index.html
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . index.html [QSA,L]

        # Allow access
        Allow from all
        Require all granted
    </Directory>

    # Gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>

    # Cache static assets
    <FilesMatch "\.(jpg|jpeg|png|gif|ico|css|js)$">
        Header set Cache-Control "max-age=31536000, public"
    </FilesMatch>

    <FilesMatch "\.html$">
        Header set Cache-Control "max-age=3600, public"
    </FilesMatch>
</VirtualHost>
