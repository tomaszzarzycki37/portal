<VirtualHost *:80>
    ServerName autachin.pl
    ServerAlias www.autachin.pl
    ServerAdmin admin@autachin.pl

    # Static files
    Alias /static/ /var/www/PORTAL/frontend/dist/
    <Directory /var/www/PORTAL/frontend/dist/>
        Require all granted
        # Enable browser caching for static assets
        <FilesMatch "\.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$">
            Header set Cache-Control "public, max-age=31536000"
        </FilesMatch>
    </Directory>

    # API proxy to Gunicorn
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api

    # Admin endpoint
    ProxyPass /admin http://127.0.0.1:8000/admin
    ProxyPassReverse /admin http://127.0.0.1:8000/admin

    # Django static files
    ProxyPass /static http://127.0.0.1:8000/static
    ProxyPassReverse /static http://127.0.0.1:8000/static

    # Root - serve React app
    <Directory /var/www/PORTAL/frontend/dist/>
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    DocumentRoot /var/www/PORTAL/frontend/dist/

    # Logging
    ErrorLog /var/log/apache2/autachin_error.log
    CustomLog /var/log/apache2/autachin_access.log combined

    # Enable mod_rewrite
    <IfModule mod_rewrite.c>
        RewriteEngine On
    </IfModule>

    # Security headers
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-Content-Type-Options "nosniff"
    Header set X-XSS-Protection "1; mode=block"
    Header set Referrer-Policy "strict-origin-when-cross-origin"

    # CORS headers for API
    Header set Access-Control-Allow-Origin "*"
    Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header set Access-Control-Allow-Headers "Content-Type, Authorization"

</VirtualHost>
